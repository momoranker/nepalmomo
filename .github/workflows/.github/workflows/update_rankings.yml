name: Auto Update Momo Rankings

on:
  schedule:
    # Runs every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub

jobs:
  update-rankings:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests openpyxl

      - name: Run scraper
        run: python nepal_momo_scraper_v3.py

      - name: Update website with fresh data
        run: python update_site.py

      - name: Rename HTML to index.html
        run: |
          if [ -f kathmandu_momo_rankings.html ]; then
            cp kathmandu_momo_rankings.html index.html
          fi

      - name: Commit and push updated site
        run: |
          git config --global user.name "momoranker"
          git config --global user.email "action@github.com"
          git add index.html kathmandu_momo_rankings.html nepal_momo_expert_leaderboard.xlsx
          git diff --staged --quiet || git commit -m "Auto-update rankings $(date '+%Y-%m-%d %H:%M')"
          git push
